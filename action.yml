name: Dotnet Nuget Login
description: Login to a NuGet registry.
author: ser.soft GmbH
inputs:
  update:
    description: Whether to update the existing credentials for the registry. If false, the action will fail if the source already exist.
    required: false
    default: 'false'
  registry-name:
    description: The name of the registry to log in to.
    required: true
  registry-url:
    description: The NuGet registry to log in to. Required if `update` is false!
    required: false
  protocol-version:
    description: The protocol version to use for the registry.
    required: false
  username:
    description: The username to use for the login.
    required: false
  password:
    description: The password to use for the login.
    required: false
  store-password-in-cleartext:
    description: Whether to store the password in cleartext. The cleanup of this action will remove it again.
    required: false
    default: 'true'
  config-file:
    description: The path to the NuGet configuration file. Uses the default config file by default.
    required: false
runs:
  using: node24
  main: dist/index.js
  post: dist/index.js
branding:
  color: blue
  icon: log-in
